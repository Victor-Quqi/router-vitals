<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Any Router 状态</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" focusable="false">
              <path d="M9 25h8l4-12 6 22 5-14h7" />
            </svg>
          </span>
          <div>
            <h1>Any Router 状态</h1>
            <p>Claude Code 社区轮次观测</p>
          </div>
        </div>
        <div class="updated" id="updated">等待数据</div>
      </header>

      <section class="summary" aria-live="polite">
        <div>
          <div class="stateLine">
            <div class="state" id="state">加载中</div>
            <button
              class="help stateHelp"
              type="button"
              aria-label="总状态判断说明"
              data-tip="少于 5 条为样本不足；成功率 >= 95% 为可用，50% 到 95% 以下为不稳定，低于 50% 为不可用。"
            >?</button>
          </div>
          <div class="stateDetail" id="stateDetail">正在读取最近观测结果</div>
        </div>
        <div class="windowTabs" role="tablist" aria-label="时间窗口">
          <button class="active" data-window="60m" type="button">近60分钟</button>
          <button data-window="24h" type="button">近24小时</button>
          <button data-window="7d" type="button">近7天</button>
          <button data-window="30d" type="button">近30天</button>
        </div>
      </section>

      <section class="metrics" aria-label="状态指标">
        <article>
          <span>轮次成功率 <button class="help" type="button" aria-label="轮次成功率说明" data-tip="成功轮次 / 总轮次。样本少于 5 时不判断可用状态。">?</button></span>
          <strong id="availability">--</strong>
          <em id="availabilityMath">--</em>
        </article>
        <article>
          <span>轮次数 <button class="help" type="button" aria-label="轮次数说明" data-tip="当前时间窗口内完成并上报的 Claude Code 用户轮次，不是底层 API 请求次数。">?</button></span>
          <strong id="sampleCount">--</strong>
        </article>
        <article>
          <span>失败轮次 <button class="help" type="button" aria-label="失败轮次说明" data-tip="StopFailure 上报的轮次数。错误类型只使用白名单分类，不上传原始错误文本。">?</button></span>
          <strong id="failureCountMetric">--</strong>
        </article>
      </section>

      <section class="panel trendPanel">
        <div class="panelHeader">
          <h2>模型趋势</h2>
          <span id="bucketInfo">--</span>
        </div>
        <div class="trendLegend" aria-label="趋势颜色说明">
          <span><i class="dot empty"></i>无数据</span>
          <span><i class="dot success"></i>全成功</span>
          <span><i class="dot mixed"></i>成功和失败混合</span>
          <span><i class="dot failure"></i>全失败</span>
        </div>
        <div class="modelTable" id="modelTable"></div>
      </section>

      <section class="panel">
        <div class="panelHeader">
          <h2>主要错误类型 <button class="help" type="button" aria-label="错误类型说明" data-tip="显示友好分类；可展开查看 HTTP 状态码和脱敏错误摘要。">?</button></h2>
          <span id="failureCount">当前窗口 --</span>
        </div>
        <div id="errors" class="errorList"></div>
      </section>

      <footer>
        数据来自自愿安装插件的 Claude Code 用户；页面只展示聚合后的轮次观测结果，不代表官方 SLA 或单次 API 请求指标。
      </footer>
    </main>
    <script src="./config.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
