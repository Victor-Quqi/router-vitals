<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-site-sync="title">Any Router 状态</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <script>
      (() => {
        const key = "router-vitals-theme";
        try {
          const stored = localStorage.getItem(key);
          const mode = stored === "light" || stored === "dark" ? stored : "system";
          const resolved = mode === "system"
            ? (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
            : mode;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themeMode = mode;
        } catch {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.dataset.themeMode = "system";
        }
      })();
    </script>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" focusable="false">
              <path d="M9 25h8l4-12 6 22 5-14h7" />
            </svg>
          </span>
          <div>
            <h1 id="siteTitle">Any Router 状态</h1>
            <p id="siteSubtitle">Claude Code / Codex 社区轮次观测</p>
          </div>
        </div>
        <div class="topActions">
          <a class="githubLink" data-site-sync="github" href="https://github.com/Victor-Quqi/router-vitals" target="_blank" rel="noreferrer" aria-label="GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.5v-1.91c-2.78.62-3.37-1.22-3.37-1.22-.45-1.19-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.93.86.09-.67.35-1.12.63-1.38-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.92c.85 0 1.7.12 2.5.35 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.46.1 2.72.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.56 5.06.36.32.68.95.68 1.92v2.85c0 .28.18.6.69.5A10.17 10.17 0 0 0 22 12.25C22 6.59 17.52 2 12 2Z" />
            </svg>
          </a>
          <button class="themeButton" id="themeButton" type="button" aria-label="主题：跟随系统">
            <svg class="themeIcon sunIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 4V2M12 22v-2M4 12H2M22 12h-2M5.64 5.64 4.22 4.22M19.78 19.78l-1.42-1.42M18.36 5.64l1.42-1.42M4.22 19.78l1.42-1.42" />
              <circle cx="12" cy="12" r="4.2" />
            </svg>
            <svg class="themeIcon moonIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M20.5 14.5A7.6 7.6 0 0 1 9.5 3.5 8.5 8.5 0 1 0 20.5 14.5Z" />
            </svg>
            <svg class="systemBadge" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <rect x="3" y="3.5" width="10" height="7" rx="1.4" />
              <path d="M6.5 13h3M8 10.5V13" />
            </svg>
          </button>
          <div class="endpointTabs" id="endpointTabs" role="tablist" aria-label="端点">
            <button class="active" data-target-host="all" type="button">全部端点</button>
          </div>
          <label class="autoRefresh" id="autoRefreshControl">
            <input id="autoRefreshToggle" type="checkbox">
            <span class="switchText">自动刷新</span>
          </label>
          <button class="refreshButton" id="refreshButton" type="button" aria-label="刷新">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M20 11a8 8 0 0 0-14.9-4M4 4v5h5M4 13a8 8 0 0 0 14.9 4M20 20v-5h-5" />
            </svg>
          </button>
        </div>
      </header>

      <section class="summary" aria-live="polite">
        <div>
          <div class="stateLine">
            <div class="state" id="state">加载中</div>
            <button
              class="help tooltip stateHelp"
              type="button"
              aria-label="总状态判断说明"
              data-tip="少于 5 条为样本不足；成功率 >= 80% 为可用，30% 到 80% 以下为不稳定，低于 30% 为不可用。"
            >?</button>
          </div>
          <div class="stateDetail" id="stateDetail">正在读取最近观测结果</div>
          <div class="updated" id="updatedAt">更新于 --</div>
        </div>
        <div class="summaryControls">
          <div class="windowTabs" role="tablist" aria-label="时间窗口">
            <button class="active" data-window="60m" type="button">近60分钟</button>
            <button data-window="24h" type="button">近24小时</button>
            <button data-window="7d" type="button">近7天</button>
            <button data-window="30d" type="button">近30天</button>
          </div>
        </div>
      </section>

      <section class="metrics" aria-label="状态指标">
        <article>
          <span>轮次成功率 <button class="help tooltip" type="button" aria-label="轮次成功率说明" data-tip="成功轮次 / 总轮次。样本少于 5 时不判断可用状态。">?</button></span>
          <strong id="availability">--</strong>
          <em id="availabilityMath">--</em>
        </article>
        <article>
          <span>首次响应 P50 <button class="help tooltip" type="button" aria-label="首次响应 P50 说明" data-tip="成功轮次的首次响应耗时中位区间；Claude Code 含客户端重试等待，Codex 使用客户端首 token 耗时，不是底层 API TTFT。">?</button></span>
          <strong id="assistantStart">--</strong>
          <em id="assistantStartDetail">--</em>
        </article>
        <article>
          <span>轮次数 <button class="help tooltip" type="button" aria-label="轮次数说明" data-tip="当前时间窗口内完成并上报的用户轮次，不是底层 API 请求次数。">?</button></span>
          <strong id="sampleCount">--</strong>
        </article>
        <article>
          <span>失败轮次 <button class="help tooltip" type="button" aria-label="失败轮次说明" data-tip="上报为失败的轮次数。">?</button></span>
          <strong id="failureCountMetric">--</strong>
        </article>
      </section>

      <section class="panel trendPanel">
        <div class="panelHeader">
          <div class="panelTitle">
            <h2>模型趋势</h2>
            <span>点击模型名或色块，查看对应模型或时间段的状态指标和错误类型</span>
          </div>
        </div>
        <div class="trendLegend" aria-label="趋势颜色说明">
          <span><i class="dot empty"></i>无数据</span>
          <span><i class="dot success"></i>全成功</span>
          <span><i class="dot mixed"></i>成功和失败混合</span>
          <span><i class="dot failure"></i>全失败</span>
        </div>
        <div class="modelTable" id="modelTable"></div>
      </section>

      <section class="panel" id="errorPanel">
        <div class="panelHeader errorHeader">
          <div class="panelTitle">
            <h2>主要错误类型</h2>
            <span id="failureCount">当前窗口 --</span>
          </div>
          <div class="modelTabs" id="modelScopeTabs" role="tablist" aria-label="模型范围"></div>
        </div>
        <div id="errors" class="errorList"></div>
      </section>

      <footer>
        数据来自自愿<a data-site-sync="install-link" href="https://github.com/Victor-Quqi/router-vitals" target="_blank" rel="noreferrer">安装插件</a>的 Claude Code / Codex 用户；页面只展示聚合后的轮次观测结果，不代表官方 SLA 或单次 API 请求指标。
      </footer>
    </main>
    <script src="./config.js" type="module"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
