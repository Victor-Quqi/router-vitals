name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Test
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    env:
      CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
      STATUS_API_BASE_URL: ${{ vars.STATUS_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate deployment variables
        run: |
          test -n "$CLOUDFLARE_D1_DATABASE_ID"
          test -n "$STATUS_API_BASE_URL"

      - name: Inject D1 database id
        run: perl -0pi -e 's/replace-with-d1-database-id/$ENV{CLOUDFLARE_D1_DATABASE_ID}/g' worker/wrangler.toml

      - name: Inject status page API base
        run: node -e "const fs = require('fs'); const value = 'window.ANYROUTER_STATUS_API_BASE = ' + JSON.stringify(process.env.STATUS_API_BASE_URL) + ';\\n'; fs.writeFileSync('status-page/config.js', value);"

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply router-vitals --remote --config worker/wrangler.toml

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config worker/wrangler.toml

      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy status-page --project-name=router-vitals
