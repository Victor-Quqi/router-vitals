name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check site config sync
        run: |
          pnpm run sync:site
          git diff --exit-code -- site.config.json src/shared/site-config.mts plugin/.claude-plugin/plugin.json plugin/.codex-plugin/plugin.json .claude-plugin/marketplace.json .agents/plugins/marketplace.json worker/wrangler.toml worker/wrangler.preview.toml status-page/index.html

      - name: Test
        run: pnpm test

      - name: Check generated files
        run: git diff --exit-code -- plugin worker shared status-page scripts
